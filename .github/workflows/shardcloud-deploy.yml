name: Deploy to Shard Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Shard Cloud API key
        env:
          SHARD_CLOUD_API_KEY: ${{ secrets.SHARD_CLOUD_API_KEY }}
        run: |
          if [ -z "$SHARD_CLOUD_API_KEY" ]; then
            echo "::error::Missing repository secret SHARD_CLOUD_API_KEY"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Preflight deploy
        run: npm run deploy:check

      - name: Build project
        run: |
          npm run build

      - name: Deploy and restart application
        uses: shard-cloud/action@main
        with:
          token: ${{ secrets.SHARD_CLOUD_API_KEY }}
          commands: |
            commit 5b061ec4-2c46-4506-b567-56c463f7a9d9
            restart 5b061ec4-2c46-4506-b567-56c463f7a9d9

      - name: Verify Shard Cloud health
        run: |
          check_api_health() {
            endpoint="$1"
            url="https://ricardinho98.shardweb.app$endpoint"
            echo "Checking $url"
            for attempt in $(seq 1 24); do
              if curl --fail --silent --show-error --max-time 30 "$url" > /tmp/health.json && grep -q '"status":"ok"' /tmp/health.json; then
                cat /tmp/health.json
                echo
                return 0
              fi
              echo "Waiting for healthy API response ($attempt/24)..."
              sleep 10
            done
            cat /tmp/health.json || true
            return 1
          }

          check_root() {
            url="https://ricardinho98.shardweb.app/"
            echo "Checking $url"
            for attempt in $(seq 1 12); do
              if curl --fail --silent --show-error --max-time 30 "$url" > /tmp/root.html \
                && ! grep -qi "502 Bad Gateway" /tmp/root.html; then
                head -c 200 /tmp/root.html
                echo
                return 0
              fi
              echo "Waiting for frontend response ($attempt/12)..."
              sleep 10
            done
            head -c 1000 /tmp/root.html || true
            return 1
          }

          check_api_health "/api/health"
          check_root
